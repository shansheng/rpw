server:
  port: 8080
  servlet:
    context-path: /

spring:
  main:
    allow-bean-definition-overriding: true
    allow-circular-references: true
  # 数据源配置
  datasource:
    url: jdbc:mysql://localhost:3306/rpw_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD:FundTracker2024!}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5000ms

  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

  # Liquibase配置（使用 Flowable 内置的 Liquibase 管理 Flowable 表）
  liquibase:
    enabled: false

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.company.rpw.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT配置
jwt:
  secret: ${JWT_SECRET:3oa5sggvvf5tZ0Dv368aYL0lGqU5HLKUHFYshQcA7PmWkraK56sSrNkr5sJ74y0olm4xEtqlU7DjiOjyFQIFdw==}
  expiration: 86400

# Knife4j配置
knife4j:
  enable: true

# Flowable配置
flowable:
  async-executor-activate: true
  database-schema-update: true
  # 禁用不必要的引擎（仅保留 ProcessEngine）
  app:
    enabled: false
  cmmn:
    enabled: false
  dmn:
    enabled: false
  eventregistry:
    enabled: false
  idm:
    enabled: false
  # 启用Flowable自动部署
  process:
    definition-cache-limit: 100
    deployment-enabled: true
  # 历史记录级别：none, activity, audit, full
  history-level: full
